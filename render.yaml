services:
  - type: web
    name: ebay-agent-research-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: MCP_API_KEY
        sync: false
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: EBAY_DEV_ID
        sync: false
      - key: EBAY_AUTH_TOKEN
        sync: false
      - key: EBAY_SITE_ID
        value: "0"
      - key: EBAY_COMPATIBILITY_LEVEL
        value: "1231"
      - key: EBAY_MARKETPLACE_ID
        value: EBAY_US
